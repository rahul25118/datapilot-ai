version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: datapilot_postgres
    environment:
      POSTGRES_USER: datapilot_admin
      POSTGRES_PASSWORD: SecretProductionPassword2026!
      POSTGRES_DB: datapilot_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datapilot_admin -d datapilot_prod"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - datapilot_net

  redis:
    image: redis:7.2-alpine
    container_name: datapilot_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - datapilot_net

  backend:
    build: ./backend
    container_name: datapilot_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://datapilot_admin:SecretProductionPassword2026!@postgres:5432/datapilot_prod
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - datapilot_net

  celery_worker:
    build: ./backend
    container_name: datapilot_celery
    command: celery -A app.tasks.worker.celery_app worker --loglevel=info -E
    environment:
      - DATABASE_URL=postgresql://datapilot_admin:SecretProductionPassword2026!@postgres:5432/datapilot_prod
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - datapilot_net

  frontend:
    build: ./frontend
    container_name: datapilot_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - datapilot_net

volumes:
  postgres_data:
  redis_data:

networks:
  datapilot_net:
    driver: bridge
